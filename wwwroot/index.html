<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

    <div class="forms-container">
        <!-- Registration Form -->
        <div class="form-wrapper">
            <form id="register-form" class="form-card">
                <h2>Register</h2>
                <div class="form-group">
                    <label for="register-username">Username</label>
                    <input type="text" id="register-username" name="username" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label for="register-email">Email</label>
                    <input type="email" id="register-email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="register-password">Password</label>
                    <input type="password" id="register-password" name="password" placeholder="Create a password" required>
                </div>
                <button type="submit" class="btn" id="register-button">Register</button>
            </form>
        </div>

        <!-- Login Form -->
        <div class="form-wrapper">
            <form id="login-form" class="form-card">
                <h2>Login</h2>
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn" id="login-button">Login</button>
            </form>
        </div>
    </div>
    
    <div id="content" class="hidden">
        <h1>Welcome back!</h1>
        <p>This is your protected content.</p>
        <div id="products-container"></div>
        <button id="logout-btn" class="btn">Logout</button>
    </div>


    <script src="./src/main.js"></script>
</body>
</html>
